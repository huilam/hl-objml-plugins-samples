#
#
objml.mlmodel.experimental=true
objml.mlmodel.name=DocLayout-YOLO
objml.mlmodel.desc=
objml.mlmodel.license=AGPL-3.0

# 0:DNN_BACKEND_DEFAULT (3:DNN_BACKEND_OPENCV)
# 2:DNN_BACKEND_INFERENCE_ENGINE (OpenVINO)
# 5:DNN_BACKEND_CUDA
objml.mlmodel.net.dnn.backend=0

# 0:DNN_TARGET_CPU
# 1:DNN_TARGET_OPENCL (Intel Arc/Iris)
# 6:DNN_TARGET_CUDA
# 9:DNN_TARGET_NPU
objml.mlmodel.net.dnn.target=0

# https://docs.ultralytics.com/integrations/onnx/
objml.mlmodel.detection.filename=doclayout_yolo_docstructbench_imgsz1024.onnx
objml.mlmodel.detection.confidence-threshold=0.01
objml.mlmodel.detection.nms-threshold=

objml.mlmodel.detection.input-size=1024x1024
objml.mlmodel.detection.support-labels=${file:/doclayout.names}
objml.mlmodel.detection.implementation.classname=hl.objml.opencv.doclayout.dnn.plugins.yolo.DocLayoutYolo10Detector
